# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

# ═══════════════════════════════════════════════════════════════════════════════
# MONDE VITRINE (PUBLIC) - Uniquement pour utilisateurs NON CONNECTÉS
# ═══════════════════════════════════════════════════════════════════════════════
app_vitrine_home:
    path: /
    controller: App\Controller\Vitrine\FrontController::home

app_vitrine_filieres:
    path: /filieres
    controller: App\Controller\Vitrine\FrontController::filieres

app_vitrine_filiere_show:
    path: /filieres/{id}
    controller: App\Controller\Vitrine\FrontController::filiereShow
    requirements:
        id: '\d+'

app_vitrine_etablissements:
    path: /etablissements
    controller: App\Controller\Vitrine\FrontController::etablissements

app_vitrine_etablissement_show:
    path: /etablissements/{id}
    controller: App\Controller\Vitrine\FrontController::etablissementShow
    requirements:
        id: '\d+'

app_vitrine_tests:
    path: /tests-orientation
    controller: App\Controller\Vitrine\FrontController::tests

# ═══════════════════════════════════════════════════════════════════════════════
# MONDE SYSTÈME (PRIVÉ) - Uniquement pour utilisateurs CONNECTÉS
# ═══════════════════════════════════════════════════════════════════════════════
app_system_eleve:
    path: /eleve
    controller: App\Controller\System\EleveController::dashboard

app_system_conseiller:
    path: /conseiller
    controller: App\Controller\System\ConseillerController::dashboard

app_system_etablissement:
    path: /etablissement
    controller: App\Controller\System\EtablissementController::dashboard

app_system_admin:
    path: /admin
    controller: App\Controller\System\AdminController::dashboard

# Back-Office Routes
admin_dashboard:
    path: /admin
    controller: App\Controller\Admin\AdminDashboardController::index

admin_filiere_index:
    path: /admin/filieres
    controller: App\Controller\Admin\AdminFiliereController::index

admin_filiere_new:
    path: /admin/filieres/new
    controller: App\Controller\Admin\AdminFiliereController::new

admin_filiere_edit:
    path: /admin/filieres/{id}/edit
    controller: App\Controller\Admin\AdminFiliereController::edit
    requirements:
        id: '\d+'

admin_filiere_show:
    path: /admin/filieres/{id}
    controller: App\Controller\Admin\AdminFiliereController::show
    requirements:
        id: '\d+'

admin_filiere_delete:
    path: /admin/filieres/{id}/delete
    controller: App\Controller\Admin\AdminFiliereController::delete
    requirements:
        id: '\d+'
    methods: [POST]

admin_etablissement_index:
    path: /admin/etablissements
    controller: App\Controller\Admin\AdminEtablissementController::index

admin_etablissement_new:
    path: /admin/etablissements/new
    controller: App\Controller\Admin\AdminEtablissementController::new

admin_etablissement_edit:
    path: /admin/etablissements/{id}/edit
    controller: App\Controller\Admin\AdminEtablissementController::edit
    requirements:
        id: '\d+'

admin_etablissement_show:
    path: /admin/etablissements/{id}
    controller: App\Controller\Admin\AdminEtablissementController::show
    requirements:
        id: '\d+'

admin_etablissement_delete:
    path: /admin/etablissements/{id}/delete
    controller: App\Controller\Admin\AdminEtablissementController::delete
    requirements:
        id: '\d+'
    methods: [POST]

# Utilisateurs
admin_utilisateur_index:
    path: /admin/utilisateurs
    controller: App\Controller\Admin\AdminUserController::index

admin_utilisateur_by_role:
    path: /admin/utilisateurs/role/{role}
    controller: App\Controller\Admin\AdminUserController::indexByRole

admin_utilisateur_new:
    path: /admin/utilisateurs/new
    controller: App\Controller\Admin\AdminUserController::new

admin_utilisateur_show:
    path: /admin/utilisateurs/{id}
    controller: App\Controller\Admin\AdminUserController::show
    requirements:
        id: '\d+'

admin_utilisateur_edit:
    path: /admin/utilisateurs/{id}/edit
    controller: App\Controller\Admin\AdminUserController::edit
    requirements:
        id: '\d+'

admin_utilisateur_delete:
    path: /admin/utilisateurs/{id}/delete
    controller: App\Controller\Admin\AdminUserController::delete
    requirements:
        id: '\d+'
    methods: [POST]
